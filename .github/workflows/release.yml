name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Resource Toolkit v__VERSION__'
          releaseBody: |
            ## Resource Toolkit v0.4.1

            🐛 **Bug Fixes**

            - Fixed path handling in project asset scanner for better cross-platform compatibility
            - Resolved LF/CRLF line ending warnings in working copy

            ✨ **Improvements**

            - Explorer Tree View: Replaced flat directory list with hierarchical folder tree structure
              - Nested folder support with expand/collapse functionality
              - Priority sorting for common asset folders (backgrounds, sprites, icons, assets, palettes)
              - Visual folder count badges
              - Recursive rendering for deep folder structures

            - Asset Scanning: Improved file system traversal
              - Uses walkdir for efficient recursive scanning
              - Better handling of nested directory structures
              - Automatic filtering of hidden folders (starting with . or _)
              - Normalized path separators for Windows compatibility
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
