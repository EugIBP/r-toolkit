name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Resource Toolkit v__VERSION__'
          releaseBody: |
            ## Release v0.3.11

            🎨 **UI/UX Improvements**
            - New unified top toolbar in Composer view with asset filters, view modes, and zoom controls
            - All panel headers now have consistent 80px height for visual harmony
            - Project alias (display name) shown next to Back button for easy identification
            - Improved History panel with integrated Undo/Redo buttons

            ⏱️ **Smart Session Restore**
            - Automatic state persistence: reopen projects after page refresh (F5)
            - Remembers current view, project path, and active dashboard tab
            - Graceful fallback to dashboard if project not found

            📅 **Better Time Display**
            - Enhanced relative time formatting for "Last Modified" timestamps
            - Now shows: "Just now", "5 minutes ago", "Yesterday", "2 days ago", "Last week", etc.
            - Proper calendar-aware calculations (leap years, varying month lengths)

            🔧 **History & Undo Improvements**
            - Fixed undo/redo logic: now steps through history one action at a time
            - Initial project state saved as first history entry
            - Removed duplicate undo/redo buttons from history dropdown
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
