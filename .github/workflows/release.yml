name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Resource Toolkit v__VERSION__'
          releaseBody: |
            ## Resource Toolkit v0.3.21

            ✨ **What's New**

            **Composer — Completely Redesigned**
            - Brand new interface with floating toolbars for quick access
            - Improved asset explorer with tabs and smart filtering
            - Enhanced inspector for editing screens, icons, and colors
            - Better drag-and-drop experience

            **New Features**
            - Open folder in system explorer directly from the app
            - Quick search for assets with type filtering
            - Context menus for common operations
            - Improved keyboard shortcuts

            🎨 **Improvements**

            **UI/UX**
            - Unified design across all views
            - New modern components (dialogs, badges, tooltips)
            - Better hover states and animations
            - Optimized icons and visuals

            **Performance**
            - Faster canvas rendering
            - Improved asset loading
            - Reduced memory usage

            🐛 **Bug Fixes**

            - Fixed path handling for cross-platform compatibility
            - Fixed selection and focus issues
            - Fixed z-index problems with floating panels
            - Various stability improvements
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
