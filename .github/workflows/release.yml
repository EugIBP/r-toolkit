name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Resource Toolkit v__VERSION__'
          releaseBody: |
            ## Resource Toolkit v0.5.0

            🎯 **New Features**

            - **Widget Generator** — Rust-based backend for generating gauge widgets:
              - Arrow widgets: Multi-threaded frame generation with rotation transforms
              - Arc widgets: 4x MSAA anti-aliased mask generation for smooth curves
              - Slider widgets: Dual-mask system for directional rendering
              - Parallel processing with Rayon for faster batch generation

            - **Gauge Composer** — New view for designing and previewing gauge widgets

            🌲 **Explorer Tree View**

            - Replaced flat directory list with hierarchical folder tree structure
            - Nested folder support with expand/collapse functionality
            - Priority sorting for common asset folders (backgrounds, sprites, icons, assets, palettes)
            - Visual folder count badges
            - Recursive rendering for deep folder structures

            ⚙️ **Improvements**

            - Dashboard layout: Three-section header (search, tabs, view toggle)
            - Grid/List view mode now persists to disk settings
            - Added `gauge_composer` view type

            🐛 **Bug Fixes**

            - Fixed path handling in project asset scanner for cross-platform compatibility
            - Resolved LF/CRLF line ending warnings in working copy

            📦 **Dependencies**

            - Updated `image` crate to v0.25.10
            - Added `imageproc` v0.26.1 for geometric transformations
            - Added `walkdir` for efficient recursive directory traversal
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
