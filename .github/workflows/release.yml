name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Resource Toolkit v__VERSION__'
          releaseBody: |
            ## Release v0.3.7

            ### New Features
            - **Pal Asset Support**: Added native support for palette (Pal) type assets. Projects with existing Pal assets now preserve their type when saved. New Pal button added to Icon Asset Inspector for converting between Icon/Sprite/Pal types.
            - **Smart Recent Projects**: Projects now automatically sort by last modified date. When you open and work on a project, it moves to the top of the recent projects list after 3 seconds.
            - **Relative Time Display**: Recent projects now show "now", "1 minute ago", "2 hours ago", etc. instead of full dates and paths.

            ### UI/UX Improvements
            - **Project Cards**: Replaced full file path with relative timestamp for cleaner appearance
            - **Update Dialog**: Release notes now display without auto-generated icons - shows plain text as written

            ### Fixes & Stability
            - Fixed Pal assets being incorrectly converted to Icon type when saving projects
            - Fixed recent projects not updating position after opening
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
