name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Resource Toolkit v__VERSION__'
          releaseBody: |
            ## Release v0.3.5

            ### New Features
            - Hotkeys Panel moved to main interface for quicker access
            - Zoom controls in Mode Toolbar
            - Asset Explorer: directory grouping with expand/collapse (accordion)
            - Smart Stacking: stackThreshold input with persistent saving

            ### UI/UX Improvements
            - Unified font sizes (min 12px)
            - Removed number input spinners
            - History reversed (most recent first)
            - Inspector: cleaned up info boxes, enhanced hint visibility

            ### Fixes & Stability
            - Fixed data sync: Rust snake_case mapping to TypeScript
            - Fixed useMemo dependencies for asset stacks/icons
            - Updated Rust backend to scan all directories and return consistent metadata
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
